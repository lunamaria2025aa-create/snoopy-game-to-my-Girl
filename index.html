<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy Sweet Snacks 🍓</title>
    <style>
        /* Pantalla completa y reseteo móvil */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bae6fd;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
        }

        /* Contenedor del juego */
        #pantalla-juego {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-image: url('fondo.png'); 
            background-size: cover;
            background-position: center bottom;
        }

        /* Marcador flotante arriba */
        #marcador {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #1e293b;
            font-weight: bold;
            line-height: 1.5;
            z-index: 10;
            text-shadow: 2px 2px 0px white;
        }

        /* Personaje Snoopy (120px) */
        #snoopy {
            width: 120px;  
            height: 120px; 
            position: absolute;
            bottom: 120px; 
            left: calc(50% - 60px);
            background-image: url('snoopy.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            will-change: left;
        }

        /* Snacks que caen */
        .snack {
            position: absolute;
            font-size: 40px; 
            width: 45px;
            height: 45px;
            text-align: center;
            line-height: 45px;
            z-index: 4;
            will-change: top;
        }

        /* Controles táctiles en el celular */
        #zona-controles {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            z-index: 15;
        }

        .btn-control {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: rgba(30, 41, 59, 0.7);
        }

        .btn-control:transparent {
            background: rgba(255, 255, 255, 0.4); 
        }

        /* Menú de Inicio / Game Over */
        .pantalla-estado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #6b21a8;
            font-size: 36px;
            margin-bottom: 30px;
        }

        .btn-jugar {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <!-- EFECTOS DE SONIDO Y MÚSICA -->
    <audio id="musica-fondo" src="musica.mp3" loop></audio>
    <audio id="sonido-atrapado" src="atrapado.mp3"></audio>

    <div id="pantalla-juego">
        <!-- Marcador -->
        <div id="marcador">
            Puntos: <span id="puntos">0</span><br>
            Vidas: <span id="vidas">5</span>
        </div>

        <!-- Personaje Snoopy -->
        <div id="snoopy"></div>

        <!-- Botones en pantalla para el celular -->
        <div id="zona-controles">
            <div id="btn-izq" class="btn-control">◀</div>
            <div id="btn-der" class="btn-control">▶</div>
        </div>

        <!-- Pantalla de Estado -->
        <div id="menu-inicio" class="pantalla-estado">
            <h1 id="titulo-menu">Snoopy<br>Sweet Snacks</h1>
            <button class="btn-jugar" onclick="comenzarJuego()">¡JUGAR!</button>
        </div>
    </div>

    <script>
        const pantalla = document.getElementById('pantalla-juego');
        const snoopy = document.getElementById('snoopy');
        const txtPuntos = document.getElementById('puntos');
        const txtVidas = document.getElementById('vidas');
        const menuInicio = document.getElementById('menu-inicio');
        const tituloMenu = document.getElementById('titulo-menu');
        const audioMusica = document.getElementById('musica-fondo');
        const audioAtrapado = document.getElementById('sonido-atrapado');

        const btnIzq = document.getElementById('btn-izq');
        const btnDer = document.getElementById('btn-der');

        let puntos = 0;
        let vidas = 5;
        let juegoActivo = false;
        let velocidadCaida = 4; 
        let timeoutCreacion;
        
        const anchoSnoopy = 120; 
        let posicionSnoopy = 0;
        let anchoPantalla = pantalla.clientWidth;

        const listaSnacks = ['🍓', '🍩', '🍪', '🍦', '🍰'];

        // ESTADOS DE MOVIMIENTO CONTÍNUO
        let moviendoIzquierda = false;
        let moviendoDerecha = false;
        const velocidadSnoopy = 7; // Píxeles por cuadro (puedes subirlo si quieres que corra más rápido)

        window.addEventListener('resize', () => {
            anchoPantalla = pantalla.clientWidth;
        });

        // --- BUCLE DE MOVIMIENTO DE SNOOPY ---
        function actualizarMovimientoSnoopy() {
            if (!juegoActivo) return;

            if (moviendoIzquierda) {
                posicionSnoopy -= velocidadSnoopy;
                if (posicionSnoopy < 0) posicionSnoopy = 0;
            }
            if (moviendoDerecha) {
                posicionSnoopy += velocidadSnoopy;
                if (posicionSnoopy > (anchoPantalla - anchoSnoopy)) posicionSnoopy = anchoPantalla - anchoSnoopy;
            }

            snoopy.style.left = posicionSnoopy + 'px';
            requestAnimationFrame(actualizarMovimientoSnoopy);
        }

        // --- ENLAZAR BOTONES TÁCTILES (MÓVIL) ---
        btnIzq.addEventListener('touchstart', (e) => { e.preventDefault(); moviendoIzquierda = true; });
        btnIzq.addEventListener('touchend', (e) => { e.preventDefault(); moviendoIzquierda = false; });

        btnDer.addEventListener('touchstart', (e) => { e.preventDefault(); moviendoDerecha = true; });
        btnDer.addEventListener('touchend', (e) => { e.preventDefault(); moviendoDerecha = false; });

        // --- ENLAZAR MOUSE (POR SI PRUEBAS EN PC) ---
        btnIzq.addEventListener('mousedown', () => moviendoIzquierda = true);
        btnIzq.addEventListener('mouseup', () => moviendoIzquierda = false);
        btnIzq.addEventListener('mouseleave', () => moviendoIzquierda = false);

        btnDer.addEventListener('mousedown', () => moviendoDerecha = true);
        btnDer.addEventListener('mouseup', () => moviendoDerecha = false);
        btnDer.addEventListener('mouseleave', () => moviendoDerecha = false);

        // --- SOPORTE TECLADO (FLECHAS) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moviendoIzquierda = true;
            if (e.key === 'ArrowRight') moviendoDerecha = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') moviendoIzquierda = false;
            if (e.key === 'ArrowRight') moviendoDerecha = false;
        });


        // --- LÓGICA DE UN SOLO SNACK A LA VEZ ---
        function gestionarFlujoSnacks() {
            if (!juegoActivo) return;
            let tiempoEspera = Math.random() * (1200 - 500) + 500;
            timeoutCreacion = setTimeout(crearSnack, tiempoEspera);
        }

        function crearSnack() {
            if (!juegoActivo) return;

            const snack = document.createElement('div');
            snack.classList.add('snack');
            snack.innerText = listaSnacks[Math.floor(Math.random() * listaSnacks.length)];
            
            const xAleatoria = Math.floor(Math.random() * (anchoPantalla - 45));
            snack.style.left = xAleatoria + 'px';
            snack.style.top = '-50px';
            
            pantalla.appendChild(snack);

            let posicionY = -50;
            const altoPantalla = pantalla.clientHeight;
            const limiteSuelo = altoPantalla - 240; 

            function caer() {
                if (!juegoActivo) {
                    snack.remove();
                    return;
                }

                posicionY += velocidadCaida;
                snack.style.top = posicionY + 'px';

                // Detección de colisión
                if (posicionY >= limiteSuelo && posicionY <= limiteSuelo + 40) {
                    const snackX = parseInt(snack.style.left);
                    
                    if (snackX + 40 >= posicionSnoopy && snackX <= posicionSnoopy + anchoSnoopy) {
                        puntos++;
                        txtPuntos.innerText = puntos;
                        snack.remove();

                        audioAtrapado.currentTime = 0;
                        audioAtrapado.play().catch(e => console.log("Audio error"));

                        if (puntos % 8 === 0) velocidadCaida += 0.6;
                        
                        gestionarFlujoSnacks();
                        return;
                    }
                }

                // Si cae al fondo
                if (posicionY > (altoPantalla - 100)) {
                    snack.remove();
                    vidas--;
                    txtVidas.innerText = vidas;

                    if (vidas <= 0) {
                        finalizarJuego();
                    } else {
                        gestionarFlujoSnacks();
                    }
                } else {
                    requestAnimationFrame(caer);
                }
            }

            requestAnimationFrame(caer);
        }

        function comenzarJuego() {
            puntos = 0;
            vidas = 5;
            velocidadCaida = 4;
            anchoPantalla = pantalla.clientWidth;
            
            posicionSnoopy = (anchoPantalla / 2) - (anchoSnoopy / 2);
            snoopy.style.left = posicionSnoopy + 'px';
            
            txtPuntos.innerText = puntos;
            txtVidas.innerText = vidas;
            menuInicio.style.display = 'none';
            juegoActivo = true;

            // Reiniciar estados de movimiento
            moviendoIzquierda = false;
            moviendoDerecha = false;

            audioMusica.play().catch(error => console.log("Audio interact"));

            document.querySelectorAll('.snack').forEach(s => s.remove());
            clearTimeout(timeoutCreacion);
            
            // Iniciar bucles de juego
            crearSnack();
            actualizarMovimientoSnoopy();
        }

        function finalizarJuego() {
            juegoActivo = false;
            clearTimeout(timeoutCreacion);
            moviendoIzquierda = false;
            moviendoDerecha = false;
            audioMusica.pause();
            audioMusica.currentTime = 0;
            tituloMenu.innerHTML = "¡Fin del Juego! 🍓<br><span style='font-size:24px;'>Puntaje: " + puntos + "</span>";
            menuInicio.style.display = 'flex';
        }
    </script>
</body>
</html>
