<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy Sweet Snacks 🍓</title>
    <style>
        /* Pantalla completa y reseteo móvil */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bae6fd;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
        }

        /* Contenedor del juego */
        #pantalla-juego {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-image: url('fondo.png'); 
            background-size: cover;
            background-position: center bottom;
        }

        /* Marcador flotante arriba */
        #marcador {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #1e293b;
            font-weight: bold;
            line-height: 1.5;
            z-index: 10;
            text-shadow: 2px 2px 0px white;
        }

        /* SNOOPY AGRANDADO A 120PX */
        #snoopy {
            width: 120px;  
            height: 120px; 
            position: absolute;
            bottom: 30px; 
            left: calc(50% - 60px);
            background-image: url('snoopy.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            will-change: left;
        }

        /* Snacks que caen */
        .snack {
            position: absolute;
            font-size: 40px; /* Un poquito más grandes también */
            width: 45px;
            height: 45px;
            text-align: center;
            line-height: 45px;
            z-index: 4;
            will-change: top;
        }

        /* Menú de Inicio / Game Over */
        .pantalla-estado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #6b21a8;
            font-size: 36px;
            margin-bottom: 30px;
        }

        .btn-jugar {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }

        .btn-jugar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- EFECTOS DE SONIDO Y MÚSICA -->
    <audio id="musica-fondo" src="musica.mp3" loop></audio>
    <audio id="sonido-atrapado" src="atrapado.mp3"></audio>

    <div id="pantalla-juego">
        <!-- Marcador -->
        <div id="marcador">
            Puntos: <span id="puntos">0</span><br>
            Vidas: <span id="vidas">5</span>
        </div>

        <!-- Personaje Snoopy -->
        <div id="snoopy"></div>

        <!-- Pantalla de Estado -->
        <div id="menu-inicio" class="pantalla-estado">
            <h1 id="titulo-menu">Snoopy<br>Sweet Snacks</h1>
            <button class="btn-jugar" onclick="comenzarJuego()">¡JUGAR!</button>
        </div>
    </div>

    <script>
        const pantalla = document.getElementById('pantalla-juego');
        const snoopy = document.getElementById('snoopy');
        const txtPuntos = document.getElementById('puntos');
        const txtVidas = document.getElementById('vidas');
        const menuInicio = document.getElementById('menu-inicio');
        const tituloMenu = document.getElementById('titulo-menu');
        const audioMusica = document.getElementById('musica-fondo');
        const audioAtrapado = document.getElementById('sonido-atrapado');

        let puntos = 0;
        let vidas = 5;
        let juegoActivo = false;
        let velocidadCaida = 3.5; // Caída inicial ligeramente más suave
        let intervaloCreacion;
        
        const anchoSnoopy = 120; // Actualizado a 120
        let anchoPantalla = pantalla.clientWidth;

        const listaSnacks = ['🍓', '🍩', '🍪', '🍦', '🍰'];

        window.addEventListener('resize', () => {
            anchoPantalla = pantalla.clientWidth;
        });

        // Controles Táctiles y Mouse
        function moverSnoopy(coordenadaX) {
            if (!juegoActivo) return;
            
            let nuevaPos = coordenadaX - (anchoSnoopy / 2);
            
            if (nuevaPos < 0) nuevaPos = 0;
            if (nuevaPos > (anchoPantalla - anchoSnoopy)) nuevaPos = anchoPantalla - anchoSnoopy;
            
            snoopy.style.left = nuevaPos + 'px';
        }

        pantalla.addEventListener('touchmove', (e) => {
            const toque = e.touches[0];
            moverSnoopy(toque.clientX);
        }, { passive: true });

        pantalla.addEventListener('mousemove', (e) => {
            const rect = pantalla.getBoundingClientRect();
            moverSnoopy(e.clientX - rect.left);
        });

        // Lógica de los Snacks
        function crearSnack() {
            if (!juegoActivo) return;

            const snack = document.createElement('div');
            snack.classList.add('snack');
            snack.innerText = listaSnacks[Math.floor(Math.random() * listaSnacks.length)];
            
            const xAleatoria = Math.floor(Math.random() * (anchoPantalla - 45));
            snack.style.left = xAleatoria + 'px';
            snack.style.top = '-50px';
            
            pantalla.appendChild(snack);

            let posicionY = -50;
            const altoPantalla = pantalla.clientHeight;
            // Ajustado el límite del suelo ya que Snoopy ahora es más alto
            const limiteSuelo = altoPantalla - 150; 

            function caer() {
                if (!juegoActivo) {
                    snack.remove();
                    return;
                }

                posicionY += velocidadCaida;
                snack.style.top = posicionY + 'px';

                // Detección de colisión adaptada al nuevo tamaño
                if (posicionY >= limiteSuelo && posicionY <= limiteSuelo + 40) {
                    const snackX = parseInt(snack.style.left);
                    const snoopyX = parseInt(window.getComputedStyle(snoopy).left);
                    
                    if (snackX + 40 >= snoopyX && snackX <= snoopyX + anchoSnoopy) {
                        puntos++;
                        txtPuntos.innerText = puntos;
                        snack.remove();

                        // REPRODUCIR SONIDO DE ATRAPADO (Resetea el tiempo para que suene rápido si agarra varios seguidos)
                        audioAtrapado.currentTime = 0;
                        audioAtrapado.play().catch(e => console.log("Error de audio"));

                        // Aumento de dificultad más pausado
                        if (puntos % 10 === 0) velocidadCaida += 0.5;
                        return;
                    }
                }

                if (posicionY > altoPantalla) {
                    snack.remove();
                    vidas--;
                    txtVidas.innerText = vidas;

                    if (vidas <= 0) {
                        finalizarJuego();
                    }
                } else {
                    requestAnimationFrame(caer);
                }
            }

            requestAnimationFrame(caer);
        }

        function comenzarJuego() {
            puntos = 0;
            vidas = 5;
            velocidadCaida = 3.5;
            anchoPantalla = pantalla.clientWidth;
            snoopy.style.left = `calc(50% - ${anchoSnoopy/2}px)`;
            
            txtPuntos.innerText = puntos;
            txtVidas.innerText = vidas;
            menuInicio.style.display = 'none';
            juegoActivo = true;

            audioMusica.play().catch(error => console.log("Esperando interacción"));

            document.querySelectorAll('.snack').forEach(s => s.remove());

            clearInterval(intervaloCreacion);
            // CREADOR DE SNACKS MÁS LENTO: Ahora cada 1800ms (1.8 segundos)
            intervaloCreacion = setInterval(crearSnack, 1800);
        }

        function finalizarJuego() {
            juegoActivo = false;
            clearInterval(intervaloCreacion);
            audioMusica.pause();
            audioMusica.currentTime = 0;
            tituloMenu.innerHTML = "¡Fin del Juego! 🍓<br><span style='font-size:24px;'>Puntaje: " + puntos + "</span>";
            menuInicio.style.display = 'flex';
        }
    </script>
</body>
</html>
